<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Latest YouTube Videos</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --sidebar-bg: #212121;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --accent: #3ea6ff;
            --border: #3f3f3f;
        }

        body {
            margin: 0;
            font-family: "Roboto", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            box-sizing: border-box;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        md-outlined-text-field {
            width: 100%;
            --md-sys-color-primary: var(--accent);
            --md-sys-color-on-surface: var(--text-primary);
            --md-sys-color-on-surface-variant: var(--text-secondary);
            --md-sys-color-surface-container-highest: var(--bg-color);
            --md-sys-color-outline: var(--border);
            --md-outlined-text-field-label-text-font: "Roboto", Arial, sans-serif;
            --md-outlined-text-field-input-text-font: "Roboto", Arial, sans-serif;
        }

        #fetch-btn {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 10px 15px;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #fetch-btn:hover {
            background-color: #d1d1d1;
        }

        #fetch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #load-more {
            display: none;
            margin: 20px auto;
            width: 200px;
            background-color: var(--sidebar-bg);
            color: var(--accent);
            border: 1px solid var(--border);
        }

        #load-more:hover {
            background-color: #3d3d3d;
        }

        .video-count {
            color: #aaaaaa;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .video-item {
            display: flex;
            gap: 16px;
            color: inherit;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s;
            text-decoration: none;
        }

        .video-item:hover:not(.playing) {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .video-item.playing {
            display: block;
            position: relative;
            width: 100%;
            cursor: default;
            background-color: transparent;
        }

        .video-item.expanding {
            display: block;
            cursor: default;
            background-color: transparent;
        }

        .video-item.expanding .thumbnail-wrapper {
            width: 100%;
        }

        .video-item.expanding .video-info {
            display: none;
        }

        .video-item.playing iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.2s, transform 0.2s;
            padding: 0;
        }

        .close-btn:hover {
            background-color: #ff4e45;
            transform: scale(1.1);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 360px;
            aspect-ratio: 16 / 9;
            flex-shrink: 0;
            pointer-events: none;
            transition: width 0.4s ease-in-out;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            background-color: #2c2c2c;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 3px 4px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
        }

        .video-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 4px;
            pointer-events: none;
        }

        .video-title {
            font-size: 18px;
            font-weight: 400;
            margin: 0;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .channel-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Metadata */
        .meta-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .video-meta {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .upload-timestamp {
            font-size: 13px;
            color: #777777;
        }

        .error-msg {
            color: #ff4e45;
            font-size: 14px;
            margin-top: 10px;
        }

        #loading-indicator {
            display: none;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 20px;
        }

        .video-list.show-shorts-only .video-item:not(.is-short) {
            display: none !important;
        }

        .video-list.show-longs-only .video-item.is-short {
            display: none !important;
        }

        .video-list.hide-watched .video-item.is-watched {
            display: none !important;
        }

        .show-filter {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-label {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .watched-filter {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .connected-button-group {
            display: flex;
        }

        .connected-button-group md-filled-tonal-button {
            --md-filled-tonal-button-container-shape: 0px;
            --md-filled-tonal-button-container-color: #2b2b2b;
            --md-filled-tonal-button-label-text-color: var(--text-secondary);
            --md-filled-tonal-button-hover-label-text-color: var(--text-primary);
            --md-filled-tonal-button-pressed-label-text-color: var(--text-primary);
            --md-filled-tonal-button-container-height: 36px;
            --md-filled-tonal-button-label-text-font: "Roboto", Arial, sans-serif;
            --md-filled-tonal-button-label-text-size: 13px;
            --md-filled-tonal-button-label-text-weight: 500;
            outline: 1px solid var(--border);
        }

        .connected-button-group md-filled-tonal-button:first-child {
            --md-filled-tonal-button-container-shape-start-start: 999px;
            --md-filled-tonal-button-container-shape-end-start: 999px;
        }

        .connected-button-group md-filled-tonal-button:last-child {
            --md-filled-tonal-button-container-shape-start-end: 999px;
            --md-filled-tonal-button-container-shape-end-end: 999px;
            margin-left: -1px;
        }

        .connected-button-group md-filled-tonal-button:not(:first-child):not(:last-child) {
            margin-left: -1px;
        }

        .connected-button-group md-filled-tonal-button[selected] {
            --md-filled-tonal-button-container-color: var(--accent);
            --md-filled-tonal-button-label-text-color: #0b0b0b;
            --md-filled-tonal-button-hover-label-text-color: #0b0b0b;
            --md-filled-tonal-button-pressed-label-text-color: #0b0b0b;
            --md-filled-tonal-button-hover-state-layer-color: #0b0b0b;
            --md-filled-tonal-button-pressed-state-layer-color: #0b0b0b;
            outline-color: var(--accent);
        }

        md-switch {
            --md-sys-color-primary: var(--accent);
            --md-sys-color-on-primary: #0b0b0b;
            --md-switch-selected-track-color: var(--accent);
            --md-switch-selected-handle-color: #0b0b0b;
            --md-switch-unselected-track-color: #2b2b2b;
            --md-switch-unselected-handle-color: #9a9a9a;
            --md-switch-unselected-track-outline-color: var(--border);
            --md-switch-selected-track-outline-color: var(--border);
        }

        #reset-watched {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin-left: auto;
            transition: color 0.2s;
        }

        #reset-watched:hover {
            color: var(--text-primary);
        }

        .sidebar-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 0;
                gap: 0;
            }

            .main-content {
                padding: 12px;
            }

            .thumbnail-wrapper {
                width: 100%;
            }

            .video-item:not(.playing):not(.expanding) {
                flex-direction: column;
            }

            .video-title {
                font-size: 15px;
            }
        }
    </style>
    <script type="importmap">
            {
                "imports": {
                    "@material/web/": "https://esm.sh/@material/web/"
                }
            }
        </script>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-content" id="sidebar-content">
            <h2>Settings</h2>
            <div>
                <md-outlined-text-field id="api-key" label="YouTube API Key" type="password"
                    placeholder="AIzaSy..."></md-outlined-text-field>
            </div>
            <div>
                <md-outlined-text-field id="channel-list" label="Channels (IDs or @Handles, 1 per line)" type="textarea"
                    rows="6" placeholder="@mrbeast or UCX6OQ3DkcsbYNE6H8uQQuVA"></md-outlined-text-field>
            </div>
            <div class="show-filter">
                <span class="filter-label">Show:</span>
                <div class="connected-button-group" aria-label="Show videos">
                    <md-filled-tonal-button class="show-mode-btn" data-mode="all" selected>All</md-filled-tonal-button>
                    <md-filled-tonal-button class="show-mode-btn" data-mode="shorts">Shorts</md-filled-tonal-button>
                    <md-filled-tonal-button class="show-mode-btn" data-mode="longs">Long</md-filled-tonal-button>
                </div>
            </div>
            <div class="watched-filter">
                <span class="filter-label">Hide Watched</span>
                <md-switch id="hide-watched" aria-label="Hide watched"></md-switch>
                <span id="reset-watched">reset</span>
            </div>
            <button id="fetch-btn">Fetch Latest Videos</button>
            <div id="error-container" class="error-msg"></div>
        </div>
    </div>

    <div class="main-content">
        <div id="loading-indicator">Fetching videos...</div>
        <div class="video-list" id="video-list"></div>
        <button id="load-more">Load More</button>
        <div id="video-count-text" class="video-count"></div>
    </div>

    <script type="module">
        import '@material/web/all.js';

        // DOM Elements
        const apiKeyInput = document.getElementById('api-key');
        const channelListInput = document.getElementById('channel-list');
        const showModeButtons = Array.from(document.querySelectorAll('.show-mode-btn'));
        const hideWatchedSwitch = document.getElementById('hide-watched');
        const resetWatchedBtn = document.getElementById('reset-watched');
        const fetchBtn = document.getElementById('fetch-btn');
        const loadMoreBtn = document.getElementById('load-more');
        const videoListEl = document.getElementById('video-list');
        const errorContainer = document.getElementById('error-container');
        const loadingIndicator = document.getElementById('loading-indicator');
        const videoCountText = document.getElementById('video-count-text');

        // State Variables
        let activeChannels = []; // Stores the API Page Tokens for infinite loading
        let channelIcons = {};
        let activeVideoNode = null;
        let activeVideoHTML = "";
        let activeVideoId = null; // Track the ID of the currently playing video
        let watchedVideos = JSON.parse(localStorage.getItem('ytWatchedVideos') || '{}'); // Load watched videos from storage
        let showMode = 'all'; // all | shorts | longs

        // Load saved data on startup
        document.addEventListener('DOMContentLoaded', () => {
            const savedApiKey = localStorage.getItem('ytApiKey');
            const savedChannels = localStorage.getItem('ytChannels');
            const savedShowMode = localStorage.getItem('ytShowMode');
            const savedWatchedToggle = localStorage.getItem('ytHideWatched');

            if (savedApiKey) apiKeyInput.value = savedApiKey;
            if (savedChannels) channelListInput.value = savedChannels;
            if (savedShowMode) showMode = savedShowMode;
            if (savedWatchedToggle === 'true') hideWatchedSwitch.selected = true;
            if (savedApiKey && savedChannels) fetchAllVideos(); // Auto-fetch if data exists
            setShowMode(showMode);
        });

        // Event Listeners
        fetchBtn.addEventListener('click', fetchAllVideos);
        loadMoreBtn.addEventListener('click', fetchNextBatch);
        apiKeyInput.addEventListener('input', () => localStorage.setItem('ytApiKey', apiKeyInput.value));
        channelListInput.addEventListener('input', () => localStorage.setItem('ytChannels', channelListInput.value));
        showModeButtons.forEach(button => {
            button.addEventListener('click', () => {
                setShowMode(button.dataset.mode || 'all');
            });
        });
        hideWatchedSwitch.addEventListener('change', () => {
            localStorage.setItem('ytHideWatched', hideWatchedSwitch.selected);
            updateFilters();
        });

        resetWatchedBtn.addEventListener('click', () => {
            watchedVideos = {};
            localStorage.removeItem('ytWatchedVideos');
            document.querySelectorAll('.video-item.is-watched').forEach(el => {
                el.classList.remove('is-watched');
            });
            updateVideoCount();
        });

        window.closeActiveVideo = function (event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (activeVideoNode) {
                // Mark as watched if hideWatched is enabled
                if (hideWatchedSwitch.selected && activeVideoId) {
                    markVideoAsWatched(activeVideoId, activeVideoNode);
                }
                activeVideoNode.innerHTML = activeVideoHTML;
                activeVideoNode.classList.remove('playing', 'expanding');
                activeVideoNode = null;
                activeVideoHTML = "";
                activeVideoId = null;
            }
        };

        // 1. INITIAL FETCH: Setup the channels and get the first page
        async function fetchAllVideos() {
            const apiKey = apiKeyInput.value.trim();
            const channelInputText = channelListInput.value.trim();

            errorContainer.innerText = '';
            try { closeActiveVideo(); } catch (e) { }

            if (!apiKey || !channelInputText) {
                errorContainer.innerText = 'Please enter an API Key and at least one channel.';
                return;
            }

            const channels = channelInputText.split(/[\n,]+/).map(c => c.trim()).filter(c => c);

            // Reset Everything
            activeChannels = [];
            channelIcons = {};
            videoListEl.innerHTML = '';
            loadMoreBtn.style.display = 'none';
            fetchBtn.disabled = true;
            loadingIndicator.style.display = 'block';

            try {
                // Find the "Uploads" playlist ID for every channel input
                for (const identifier of channels) {
                    let queryUrl = identifier.startsWith('@')
                        ? `https://www.googleapis.com/youtube/v3/channels?part=snippet,contentDetails&forHandle=${identifier}&key=${apiKey}`
                        : `https://www.googleapis.com/youtube/v3/channels?part=snippet,contentDetails&id=${identifier}&key=${apiKey}`;

                    const res = await fetch(queryUrl);
                    const data = await res.json();

                    if (data.items && data.items.length > 0) {
                        const channelData = data.items[0];
                        channelIcons[channelData.id] = channelData.snippet.thumbnails.default.url;

                        // Save the channel data with a blank starting page token
                        activeChannels.push({
                            playlistId: channelData.contentDetails.relatedPlaylists.uploads,
                            channelId: channelData.id,
                            nextPageToken: '',
                            hasMore: true
                        });
                    }
                }

                if (activeChannels.length === 0) throw new Error("No valid channels found.");

                // Trigger the first data load
                await fetchNextBatch();

            } catch (error) {
                console.error(error);
                errorContainer.innerText = error.message || 'An error occurred while fetching videos.';
            } finally {
                fetchBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        }

        // 2. PAGINATION: Go to YouTube and get the NEXT page of older videos
        async function fetchNextBatch() {
            const apiKey = apiKeyInput.value.trim();

            loadMoreBtn.innerText = 'Loading older videos...';
            loadMoreBtn.disabled = true;
            if (activeChannels.every(c => !c.nextPageToken)) loadingIndicator.style.display = 'block';

            try {
                let videoIdsToFetch = [];
                let newVideos = [];

                // Ask YouTube for the next 10 older videos from every active channel
                for (const channel of activeChannels) {
                    if (!channel.hasMore) continue;

                    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${channel.playlistId}&maxResults=10&key=${apiKey}`;
                    if (channel.nextPageToken) url += `&pageToken=${channel.nextPageToken}`;

                    const plRes = await fetch(url);
                    const plData = await plRes.json();

                    if (plData.items) {
                        plData.items.forEach(item => videoIdsToFetch.push(item.snippet.resourceId.videoId));
                    }

                    // Save the new page token to use for the NEXT time we click Load More
                    if (plData.nextPageToken) {
                        channel.nextPageToken = plData.nextPageToken;
                    } else {
                        channel.hasMore = false; // This channel has reached the end of its history
                    }
                }

                if (videoIdsToFetch.length === 0) return;

                // Fetch statistics/durations for the batch
                for (let i = 0; i < videoIdsToFetch.length; i += 50) {
                    const batchIds = videoIdsToFetch.slice(i, i + 50).join(',');
                    const statRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails,player&maxWidth=1000&maxHeight=1000&id=${batchIds}&key=${apiKey}`);
                    const statData = await statRes.json();
                    if (statData.items) newVideos.push(...statData.items);
                }

                renderAndSortVideos(newVideos);

                // Show the Load More button if at least one channel still has history left
                if (activeChannels.some(c => c.hasMore)) {
                    loadMoreBtn.style.display = 'block';
                    loadMoreBtn.innerText = 'Load More';
                } else {
                    loadMoreBtn.style.display = 'none';
                }

            } catch (error) {
                console.error(error);
                errorContainer.innerText = error.message;
            } finally {
                loadMoreBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        }

        // 3. RENDER AND DOM SORTING: Merge new videos seamlessly into the timeline
        function renderAndSortVideos(videos) {
            videos.forEach(video => {
                const el = document.createElement('a');
                el.href = `https://www.youtube.com/watch?v=${video.id}`;
                el.className = 'video-item';
                el.dataset.id = video.id;

                // Check if video was previously watched
                if (watchedVideos[video.id]) {
                    el.classList.add('is-watched');
                }

                // Tag the element if it's a Short
                const embedWidth = parseInt(video.player?.embedWidth) || 16;
                const embedHeight = parseInt(video.player?.embedHeight) || 9;
                const isVertical = embedHeight >= embedWidth;
                const isShortDuration = isShortVideo(video.contentDetails.duration);
                if (isVertical && isShortDuration) {
                    el.classList.add('is-short');
                }

                // Save the exact timestamp as a data attribute on the HTML element for sorting
                const publishDate = new Date(video.snippet.publishedAt);
                el.dataset.timestamp = publishDate.getTime();

                const thumbUrl = video.snippet.thumbnails.maxres ? video.snippet.thumbnails.maxres.url : video.snippet.thumbnails.medium.url;
                const iconUrl = channelIcons[video.snippet.channelId] || '';
                const exactTimestamp = publishDate.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });

                el.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img class="thumbnail" src="${thumbUrl}" alt="Thumbnail">
                        <span class="video-duration">${formatDuration(video.contentDetails.duration)}</span>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.snippet.title}</h3>
                        <div class="channel-info">
                            ${iconUrl ? `<img class="channel-icon" src="${iconUrl}" alt="Profile">` : ''}
                            <div class="channel-name">${video.snippet.channelTitle}</div>
                        </div>
                        <div class="meta-container">
                            <div class="video-meta">
                                <span>${formatViews(video.statistics.viewCount)}</span>
                                <span>•</span>
                                <span>${timeSince(publishDate)}</span>
                            </div>
                            <div class="upload-timestamp">${exactTimestamp}</div>
                        </div>
                    </div>
                `;

                // Mark as watched on mouseup for Ctrl/Cmd/Middle click
                el.addEventListener('mouseup', function (event) {
                    if (event.button === 1 || event.ctrlKey || event.metaKey) {
                        markVideoAsWatched(this.dataset.id, this);
                    }
                });

                // Handle the click natively
                el.addEventListener('click', function (event) {
                    if (event.button !== 0 || event.ctrlKey || event.metaKey || event.shiftKey) return;
                    if (!hideWatchedSwitch.selected) markVideoAsWatched(this.dataset.id, this);

                    event.preventDefault();
                    if (activeVideoNode === this) return;
                    closeActiveVideo();

                    activeVideoNode = this;
                    activeVideoHTML = this.innerHTML;
                    const videoId = this.dataset.id;
                    activeVideoId = videoId;

                    this.classList.add('expanding');

                    setTimeout(() => {
                        if (activeVideoNode !== this) return;
                        this.classList.remove('expanding');
                        this.classList.add('playing');

                        this.innerHTML = `
                            <button class="close-btn" onclick="closeActiveVideo(event)">✕</button>
                            <iframe 
                                src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                                title="YouTube video player"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                allowfullscreen>
                            </iframe>
                        `;

                        if (this.classList.contains('is-short') && window.innerWidth <= 768) {
                            const iframe = this.querySelector('iframe');
                            if (iframe) {
                                const requestFS = iframe.requestFullscreen || iframe.webkitRequestFullscreen;
                                if (requestFS) requestFS.call(iframe).catch(() => { });
                            }
                        }
                    }, 400);
                });

                videoListEl.appendChild(el);
            });

            // Re-sort the physical HTML elements so the newest videos are always at the top
            const items = Array.from(videoListEl.children);
            items.sort((a, b) => parseInt(b.dataset.timestamp) - parseInt(a.dataset.timestamp));
            videoListEl.append(...items);
            updateVideoCount();
        }

        // Update the display instantly when filters are toggled
        function updateFilters() {
            videoListEl.classList.remove('show-shorts-only', 'show-longs-only');
            if (showMode === 'shorts') {
                videoListEl.classList.add('show-shorts-only');
            } else if (showMode === 'longs') {
                videoListEl.classList.add('show-longs-only');
            }
            if (hideWatchedSwitch.selected) {
                videoListEl.classList.add('hide-watched');
            } else {
                videoListEl.classList.remove('hide-watched');
            }
            updateVideoCount();
        }

        function setShowMode(mode) {
            showMode = mode;
            localStorage.setItem('ytShowMode', showMode);
            showModeButtons.forEach(button => {
                const isActive = button.dataset.mode === showMode;
                button.toggleAttribute('selected', isActive);
            });
            updateFilters();
        }

        // Update the "Showing X/Y videos" text
        function updateVideoCount() {
            const items = Array.from(document.querySelectorAll('.video-item'));
            const totalVideos = items.length;
            const visibleVideos = items.filter(item => {
                const isShort = item.classList.contains('is-short');
                const isWatched = item.classList.contains('is-watched');
                if (showMode === 'shorts' && !isShort) return false;
                if (showMode === 'longs' && isShort) return false;
                if (hideWatchedSwitch.selected && isWatched) return false;
                return true;
            }).length;

            if (totalVideos > 0) {
                videoCountText.innerText = `Showing ${visibleVideos}/${totalVideos} videos`;
            } else {
                videoCountText.innerText = '';
            }
        }

        // Utility: Format Views
        function formatViews(views) {
            if (!views) return '0 views';
            const num = parseInt(views);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M views';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K views';
            return num.toLocaleString() + ' views';
        }

        // Utility: Format Time Ago
        function timeSince(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return Math.floor(seconds) + " seconds ago";
        }

        // Utility: Format YouTube ISO 8601 Duration
        function formatDuration(duration) {
            const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
            if (!match) return '0:00';
            const hours = (parseInt(match[1]) || 0);
            const minutes = (parseInt(match[2]) || 0);
            const seconds = (parseInt(match[3]) || 0);
            let result = '';
            if (hours > 0) {
                result += hours + ':';
                result += minutes.toString().padStart(2, '0') + ':';
            } else {
                result += minutes + ':';
            }
            result += seconds.toString().padStart(2, '0');
            return result;
        }

        // Utility: Check if a video is a Short (<= 61 seconds)
        function isShortVideo(duration) {
            const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
            if (!match) return false;

            const hours = parseInt(match[1]) || 0;
            const minutes = parseInt(match[2]) || 0;
            const seconds = parseInt(match[3]) || 0;

            const totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
            return totalSeconds <= 61; // 61s accounts for YouTube's occasional 1-second rounding error
        }

        // Mark a video as watched and update storage
        function markVideoAsWatched(videoId, element) {
            if (!watchedVideos[videoId]) {
                watchedVideos[videoId] = true;
                localStorage.setItem('ytWatchedVideos', JSON.stringify(watchedVideos));
                if (element) {
                    element.classList.add('is-watched');
                    updateVideoCount();
                }
            }
        }
    </script>
