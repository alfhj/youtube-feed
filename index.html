<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Latest YouTube Videos</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --sidebar-bg: #212121;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --accent: #3ea6ff;
            --border: #3f3f3f;
        }

        body {
            margin: 0;
            font-family: "Roboto", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            box-sizing: border-box;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* Form Elements */
        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input,
        textarea {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        button {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 10px 15px;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #d1d1d1;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #load-more {
            display: none;
            margin: 20px auto;
            width: 200px;
            background-color: var(--sidebar-bg);
            color: var(--accent);
            border: 1px solid var(--border);
        }

        #load-more:hover {
            background-color: #3d3d3d;
        }

        .video-count {
            color: #aaaaaa;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }

        /* Video List Styles */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .video-item {
            display: flex;
            gap: 16px;
            color: inherit;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s;
            text-decoration: none;
        }

        .video-item:hover:not(.playing) {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Player State Styles */
        .video-item.playing {
            display: block;
            position: relative;
            width: 100%;
            cursor: default;
            background-color: transparent;
        }

        .video-item.expanding {
            display: block;
            cursor: default;
            background-color: transparent;
        }

        .video-item.expanding .thumbnail-wrapper {
            width: 100%;
        }

        .video-item.expanding .video-info {
            display: none;
        }

        .video-item.playing iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.2s, transform 0.2s;
            padding: 0;
        }

        .close-btn:hover {
            background-color: #ff4e45;
            transform: scale(1.1);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 360px;
            aspect-ratio: 16 / 9;
            flex-shrink: 0;
            pointer-events: none;
            transition: width 0.4s ease-in-out;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            background-color: #2c2c2c;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 3px 4px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
        }

        .video-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 4px;
            pointer-events: none;
        }

        .video-title {
            font-size: 18px;
            font-weight: 400;
            margin: 0;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Channel Info container */
        .channel-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .channel-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Metadata */
        .meta-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .video-meta {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .upload-timestamp {
            font-size: 13px;
            color: #777777;
        }

        .error-msg {
            color: #ff4e45;
            font-size: 14px;
            margin-top: 10px;
        }

        #loading-indicator {
            display: none;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 20px;
        }

        /* Hide/show videos */
        .video-list.hide-shorts .video-item.is-short {
            display: none !important;
        }

        .video-list.hide-watched .video-item.is-watched:not(.playing):not(.expanding) {
            display: none !important;
        }

        #reset-watched {
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        /* Mobile Responsive */
        .sidebar-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 0;
                gap: 0;
            }

            .main-content {
                padding: 12px;
            }

            .thumbnail-wrapper {
                width: 100%;
            }

            .video-item:not(.playing):not(.expanding) {
                flex-direction: column;
            }

            .video-title {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-content" id="sidebar-content">
            <h2>Settings</h2>
            <div>
                <label for="api-key">YouTube API Key</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
            </div>
            <div>
                <label for="channel-list">Channels (IDs or @Handles, 1 per line)</label>
                <textarea id="channel-list" placeholder="@mrbeast&#10;UCX6OQ3DkcsbYNE6H8uQQuVA"></textarea>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="hide-shorts" style="width: auto;">
                <label for="hide-shorts" style="margin: 0; cursor: pointer;">Hide Shorts</label>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="hide-watched" style="width: auto;">
                <label for="hide-watched" style="margin: 0; cursor: pointer;">Hide Watched</label>
                <span id="reset-watched">reset</span>
            </div>
            <button id="fetch-btn">Fetch Latest Videos</button>
            <div id="error-container" class="error-msg"></div>
        </div>
    </div>

    <div class="main-content">
        <div id="loading-indicator">Fetching videos...</div>
        <div class="video-list" id="video-list"></div>
        <button id="load-more">Load More</button>
        <div id="video-count-text" class="video-count"></div>
    </div>

    <script>
        // DOM Elements
        const apiKeyInput = document.getElementById('api-key');
        const channelListInput = document.getElementById('channel-list');
        const hideShortsCheckbox = document.getElementById('hide-shorts');
        const hideWatchedCheckbox = document.getElementById('hide-watched');
        const resetWatchedBtn = document.getElementById('reset-watched');
        const fetchBtn = document.getElementById('fetch-btn');
        const loadMoreBtn = document.getElementById('load-more');
        const videoListEl = document.getElementById('video-list');
        const errorContainer = document.getElementById('error-container');
        const loadingIndicator = document.getElementById('loading-indicator');
        const videoCountText = document.getElementById('video-count-text');

        // State Variables
        let activeChannels = []; // { playlistId, channelId, nextPageToken, hasMore, buffer: [] }
        let channelIcons = {};
        let activeVideoNode = null;
        let activeVideoHTML = "";
        let activeVideoId = null; // Track the ID of the currently playing video
        let watchedVideos = JSON.parse(localStorage.getItem('ytWatchedVideos') || '{}'); // Load watched videos from storage

        // Load saved data on startup
        document.addEventListener('DOMContentLoaded', () => {
            const savedApiKey = localStorage.getItem('ytApiKey');
            const savedChannels = localStorage.getItem('ytChannels');
            const savedShortsToggle = localStorage.getItem('ytHideShorts');
            const savedWatchedToggle = localStorage.getItem('ytHideWatched');

            if (savedApiKey) apiKeyInput.value = savedApiKey;
            if (savedChannels) channelListInput.value = savedChannels;
            if (savedShortsToggle === 'true') hideShortsCheckbox.checked = true;
            if (savedWatchedToggle === 'true') hideWatchedCheckbox.checked = true;
            if (savedApiKey && savedChannels) fetchAllVideos(); // Auto-fetch if data exists
            updateFilters();
        });

        // Event Listeners
        fetchBtn.addEventListener('click', fetchAllVideos);
        loadMoreBtn.addEventListener('click', fetchNextBatch);
        apiKeyInput.addEventListener('input', () => localStorage.setItem('ytApiKey', apiKeyInput.value));
        channelListInput.addEventListener('input', () => localStorage.setItem('ytChannels', channelListInput.value));
        hideShortsCheckbox.addEventListener('change', () => {
            localStorage.setItem('ytHideShorts', hideShortsCheckbox.checked);
            updateFilters();
        });
        hideWatchedCheckbox.addEventListener('change', () => {
            localStorage.setItem('ytHideWatched', hideWatchedCheckbox.checked);
            updateFilters();
        });

        resetWatchedBtn.addEventListener('click', () => {
            watchedVideos = {};
            localStorage.removeItem('ytWatchedVideos');
            document.querySelectorAll('.video-item.is-watched').forEach(el => {
                el.classList.remove('is-watched');
            });
            updateVideoCount();
        });

        window.closeActiveVideo = function (event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (activeVideoNode) {
                // Mark as watched if hideWatched is enabled
                if (hideWatchedCheckbox.checked && activeVideoId) {
                    markVideoAsWatched(activeVideoId, activeVideoNode);
                }
                activeVideoNode.innerHTML = activeVideoHTML;
                activeVideoNode.classList.remove('playing', 'expanding');
                activeVideoNode = null;
                activeVideoHTML = "";
                activeVideoId = null;
            }
        };

        // 1. INITIAL FETCH: Setup the channels and get the first page
        async function fetchAllVideos() {
            const apiKey = apiKeyInput.value.trim();
            const channelInputText = channelListInput.value.trim();

            errorContainer.innerText = '';
            closeActiveVideo();

            if (!apiKey || !channelInputText) {
                errorContainer.innerText = 'Please enter an API Key and at least one channel.';
                return;
            }

            const channels = channelInputText.split(/[\n,]+/).map(c => c.trim()).filter(c => c);

            // Reset Everything
            activeChannels = [];
            channelIcons = {};
            videoListEl.innerHTML = '';
            loadMoreBtn.style.display = 'none';
            fetchBtn.disabled = true;
            loadingIndicator.style.display = 'block';

            try {
                // Find the "Uploads" playlist ID for every channel input
                for (const identifier of channels) {
                    let queryUrl = identifier.startsWith('@')
                        ? `https://www.googleapis.com/youtube/v3/channels?part=snippet,contentDetails&forHandle=${identifier}&key=${apiKey}`
                        : `https://www.googleapis.com/youtube/v3/channels?part=snippet,contentDetails&id=${identifier}&key=${apiKey}`;

                    const res = await fetch(queryUrl);
                    const data = await res.json();

                    if (data.items && data.items.length > 0) {
                        const channelData = data.items[0];
                        channelIcons[channelData.id] = channelData.snippet.thumbnails.default.url;

                        activeChannels.push({
                            playlistId: channelData.contentDetails.relatedPlaylists.uploads,
                            channelId: channelData.id,
                            nextPageToken: '',
                            hasMore: true,
                            buffer: [] // Per-channel buffer of fetched but not yet displayed videos
                        });
                    }
                }

                if (activeChannels.length === 0) throw new Error("No valid channels found.");

                // Trigger the first data load
                await fetchNextBatch();

            } catch (error) {
                console.error(error);
                errorContainer.innerText = error.message || 'An error occurred while fetching videos.';
            } finally {
                fetchBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        }

        // 2. PAGINATION: Fetch from channels with low buffers, then display the next 10 videos
        async function fetchNextBatch() {
            const apiKey = apiKeyInput.value.trim();
            const PAGE_SIZE = 10;

            loadMoreBtn.innerText = 'Loading older videos...';
            loadMoreBtn.disabled = true;
            loadingIndicator.style.display = 'block';

            try {
                // Fetch from channels whose buffer has fewer than PAGE_SIZE videos
                const channelsNeedingFetch = activeChannels.filter(c => c.hasMore && c.buffer.length < PAGE_SIZE);

                let videoIdsToFetch = [];
                const videoIdToChannel = {};

                for (const channel of channelsNeedingFetch) {
                    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${channel.playlistId}&maxResults=${PAGE_SIZE}&key=${apiKey}`;
                    if (channel.nextPageToken) url += `&pageToken=${channel.nextPageToken}`;

                    const plRes = await fetch(url);
                    const plData = await plRes.json();

                    if (plData.items) {
                        for (const item of plData.items) {
                            const videoId = item.snippet.resourceId.videoId;
                            videoIdsToFetch.push(videoId);
                            videoIdToChannel[videoId] = channel;
                        }
                    }

                    channel.nextPageToken = plData.nextPageToken || '';
                    if (!plData.nextPageToken) channel.hasMore = false;
                }

                // Fetch full video details in batches of 50
                if (videoIdsToFetch.length > 0) {
                    for (let i = 0; i < videoIdsToFetch.length; i += 50) {
                        const batchIds = videoIdsToFetch.slice(i, i + 50).join(',');
                        const statRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails,player&maxWidth=1000&maxHeight=1000&id=${batchIds}&key=${apiKey}`);
                        const statData = await statRes.json();
                        if (statData.items) {
                            for (const video of statData.items) {
                                const channel = videoIdToChannel[video.id];
                                if (channel) channel.buffer.push(video);
                            }
                        }
                    }

                    // Sort each channel's buffer by date descending
                    for (const channel of activeChannels) {
                        channel.buffer.sort((a, b) =>
                            new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt)
                        );
                    }
                }

                // Drain PAGE_SIZE videos from the combined sorted buffers
                const toRender = drainTopVideos(PAGE_SIZE);
                if (toRender.length > 0) renderVideos(toRender);

                // Show Load More if any channel still has videos (buffered or fetchable)
                const hasMore = activeChannels.some(c => c.hasMore || c.buffer.length > 0);
                loadMoreBtn.style.display = hasMore ? 'block' : 'none';
                loadMoreBtn.innerText = 'Load More';

            } catch (error) {
                console.error(error);
                errorContainer.innerText = error.message;
            } finally {
                loadMoreBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        }

        // Pull the top N videos across all channel buffers, skipping filtered-out ones
        function drainTopVideos(n) {
            const result = [];
            while (result.length < n) {
                // Find the channel whose buffer head is the most recent
                let bestChannel = null;
                let bestDate = null;
                for (const channel of activeChannels) {
                    if (channel.buffer.length === 0) continue;
                    const date = new Date(channel.buffer[0].snippet.publishedAt);
                    if (bestDate === null || date > bestDate) {
                        bestDate = date;
                        bestChannel = channel;
                    }
                }

                // No more buffered videos
                if (!bestChannel) break;

                const video = bestChannel.buffer.shift();
                const isShort = isShortVideoObject(video);
                const isWatched = !!watchedVideos[video.id];

                // Silently skip videos filtered out by active checkboxes
                if (hideShortsCheckbox.checked && isShort) continue;
                if (hideWatchedCheckbox.checked && isWatched) continue;

                result.push(video);
            }
            return result;
        }

        // 3. RENDER: Add a list of videos to the DOM (already in sorted order)
        function renderVideos(videos) {
            videos.forEach(video => {
                const el = document.createElement('a');
                el.href = `https://www.youtube.com/watch?v=${video.id}`;
                el.className = 'video-item';
                el.dataset.id = video.id;

                if (watchedVideos[video.id]) el.classList.add('is-watched');
                if (isShortVideoObject(video)) el.classList.add('is-short');

                const publishDate = new Date(video.snippet.publishedAt);
                el.dataset.timestamp = publishDate.getTime();

                const thumbUrl = video.snippet.thumbnails.maxres?.url ?? video.snippet.thumbnails.medium.url;
                const iconUrl = channelIcons[video.snippet.channelId] || '';
                const exactTimestamp = publishDate.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });

                el.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img class="thumbnail" src="${thumbUrl}" alt="Thumbnail">
                        <span class="video-duration">${formatDuration(video.contentDetails.duration)}</span>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.snippet.title}</h3>
                        <div class="channel-info">
                            ${iconUrl ? `<img class="channel-icon" src="${iconUrl}" alt="Profile">` : ''}
                            <div class="channel-name">${video.snippet.channelTitle}</div>
                        </div>
                        <div class="meta-container">
                            <div class="video-meta">
                                <span>${formatViews(video.statistics.viewCount)}</span>
                                <span>•</span>
                                <span>${timeSince(publishDate)}</span>
                            </div>
                            <div class="upload-timestamp">${exactTimestamp}</div>
                        </div>
                    </div>
                `;

                // Mark as watched on mouseup for Ctrl/Cmd/Middle click
                el.addEventListener('mouseup', function (event) {
                    if (event.button === 1 || event.ctrlKey || event.metaKey) {
                        markVideoAsWatched(this.dataset.id, this);
                    }
                });

                // Handle the click natively
                el.addEventListener('click', function (event) {
                    if (event.button !== 0 || event.ctrlKey || event.metaKey || event.shiftKey) return;
                    if (!hideWatchedCheckbox.checked) markVideoAsWatched(this.dataset.id, this);

                    event.preventDefault();
                    if (activeVideoNode === this) return;
                    closeActiveVideo();

                    activeVideoNode = this;
                    activeVideoHTML = this.innerHTML;
                    const videoId = this.dataset.id;
                    activeVideoId = videoId;

                    this.classList.add('expanding');

                    setTimeout(() => {
                        if (activeVideoNode !== this) return;
                        this.classList.remove('expanding');
                        this.classList.add('playing');

                        this.innerHTML = `
                            <button class="close-btn" onclick="closeActiveVideo(event)">✕</button>
                            <iframe 
                                src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                                title="YouTube video player"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                allowfullscreen>
                            </iframe>
                        `;
                    }, 400);
                });

                videoListEl.appendChild(el);
            });

            updateVideoCount();
        }

        // Update the display instantly when filters are toggled
        function updateFilters() {
            videoListEl.classList.toggle('hide-shorts', hideShortsCheckbox.checked);
            videoListEl.classList.toggle('hide-watched', hideWatchedCheckbox.checked);
            updateVideoCount();
        }

        // Update the "Showing X/Y videos" text
        function updateVideoCount() {
            const allVideos = document.querySelectorAll('.video-item');
            const hiddenVideos = document.querySelectorAll(
                '.video-list.hide-shorts .video-item.is-short, .video-list.hide-watched .video-item.is-watched'
            );
            const total = allVideos.length;
            const visible = total - hiddenVideos.length;

            if (total > 0) {
                videoCountText.innerText = visible === total
                    ? `Showing ${total} videos`
                    : `Showing ${visible}/${total} videos`;
            } else {
                videoCountText.innerText = '';
            }
        }

        // Utility: Format Views
        function formatViews(views) {
            if (!views) return '0 views';
            const num = parseInt(views);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M views';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K views';
            return num.toLocaleString() + ' views';
        }

        // Utility: Format Time Ago
        function timeSince(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return Math.floor(seconds) + " seconds ago";
        }

        // Utility: Format YouTube ISO 8601 Duration
        function formatDuration(duration) {
            const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
            if (!match) return '0:00';
            const hours = (parseInt(match[1]) || 0);
            const minutes = (parseInt(match[2]) || 0);
            const seconds = (parseInt(match[3]) || 0);
            let result = '';
            if (hours > 0) {
                result += hours + ':';
                result += minutes.toString().padStart(2, '0') + ':';
            } else {
                result += minutes + ':';
            }
            result += seconds.toString().padStart(2, '0');
            return result;
        }

        // Utility: Check if a video object is a Short (vertical + <= 61 seconds)
        function isShortVideoObject(video) {
            const embedWidth = parseInt(video.player?.embedWidth) || 16;
            const embedHeight = parseInt(video.player?.embedHeight) || 9;
            return embedHeight >= embedWidth && isShortVideo(video.contentDetails.duration);
        }

        // Utility: Check if a duration string is a Short (<= 61 seconds)
        function isShortVideo(duration) {
            const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
            if (!match) return false;

            const hours = parseInt(match[1]) || 0;
            const minutes = parseInt(match[2]) || 0;
            const seconds = parseInt(match[3]) || 0;

            const totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
            return totalSeconds <= 61; // 61s accounts for YouTube's occasional 1-second rounding error
        }

        // Mark a video as watched and update storage
        function markVideoAsWatched(videoId, element) {
            if (!watchedVideos[videoId]) {
                watchedVideos[videoId] = true;
                localStorage.setItem('ytWatchedVideos', JSON.stringify(watchedVideos));
                if (element) {
                    element.classList.add('is-watched');
                    updateVideoCount();
                }
            }
        }
    </script>
</body>

</html>
