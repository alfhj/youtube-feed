<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Latest YouTube Videos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-content" id="sidebar-content">
            <h2>Settings</h2>
            <div>
                <label for="api-key">YouTube API Key</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
            </div>
            <div>
                <label for="channel-list">Channels (IDs or @Handles, 1 per line)</label>
                <textarea id="channel-list" placeholder="@mrbeast&#10;UCX6OQ3DkcsbYNE6H8uQQuVA"></textarea>
            </div>
            <div class="show-filter">
                <span class="filter-label">Show:</span>
                <div class="segmented-control" role="group" aria-label="Show videos">
                    <button type="button" class="show-mode-btn" data-mode="all" aria-pressed="true">All</button>
                    <button type="button" class="show-mode-btn" data-mode="shorts" aria-pressed="false">Shorts</button>
                    <button type="button" class="show-mode-btn" data-mode="longs" aria-pressed="false">Long</button>
                </div>
            </div>
            <div class="watched-filter">
                <span class="filter-label">Hide Watched</span>
                <label class="pill-toggle">
                    <input type="checkbox" id="hide-watched" aria-label="Hide watched">
                    <span class="pill-toggle-ui" aria-hidden="true"></span>
                </label>
                <span id="reset-watched">reset</span>
            </div>
            <button id="fetch-btn">Fetch Latest Videos</button>
            <div id="error-container" class="error-msg"></div>
        </div>
    </div>

    <div class="main-content">
        <div id="loading-indicator">Fetching videos...</div>
        <div class="video-list" id="video-list"></div>
        <button id="load-more">Load More</button>
        <div id="video-count-text" class="video-count"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
